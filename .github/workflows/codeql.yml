name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-and-quality

      - name: Set up .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore RobGitHub.slnx

      - name: Build
        run: dotnet build RobGitHub.slnx --configuration Release --no-restore

      - name: Analyze code
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:csharp'
