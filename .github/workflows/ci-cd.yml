name: CI and CD # Continuous Integration and Continuous Deployment

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # manual trigger (button)

permissions:
  contents: read

jobs:
  ci:
    name: Build, format, test, and audit
    permissions:
      actions: read
      contents: read
      security-events: write
    outputs:
      restore: ${{ steps.restore.outcome }}
      format: ${{ steps.format.outcome }}
      build: ${{ steps.build.outcome }}
      test: ${{ steps.test.outcome }}
      coverage: ${{ steps.coverage.outcome }}
      coverage_percentage: ${{ steps.coverage.outputs.line_coverage }}
      dependency_audit: ${{ steps.dependency_audit.outcome }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.1

      - name: Initialize CodeQL for C#
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-and-quality

      - name: Set up .NET
        uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        id: restore
        run: dotnet restore RobGitHub.slnx

      - name: Check formatting
        id: format
        run: dotnet format RobGitHub.slnx --verify-no-changes --no-restore

      - name: Build
        id: build
        run: dotnet build RobGitHub.slnx --configuration Release --no-restore

      - name: Test
        id: test
        run: dotnet test RobGitHub.slnx --configuration Release --no-build --no-restore --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory .artifacts/coverage

      - name: Require at least 40% line coverage
        id: coverage
        shell: pwsh
        run: |
          $minimumLineCoverage = 40
          $coverageFile = Get-ChildItem .artifacts/coverage -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $coverageFile) { throw 'Cobertura coverage report was not created.' }

          [xml]$coverage = Get-Content $coverageFile.FullName
          $lineCoverage = [math]::Round(([double]$coverage.coverage.'line-rate') * 100, 2)
          Write-Host "Line coverage: $lineCoverage% (minimum: $minimumLineCoverage%)"
          "line_coverage=$lineCoverage" | Add-Content -Path $env:GITHUB_OUTPUT

          if ($lineCoverage -lt $minimumLineCoverage) {
            throw "Line coverage $lineCoverage% is below the required $minimumLineCoverage%."
          }

      - name: Check known vulnerable dependencies
        id: dependency_audit
        shell: pwsh
        run: |
          dotnet list RobGitHub.slnx package --vulnerable --include-transitive | Tee-Object -Variable dependencyReport
          if ($LASTEXITCODE -ne 0) { throw 'Dependency vulnerability scan failed.' }
          if ($dependencyReport -match '(?i)has the following vulnerable packages|critical|high') {
            throw 'Known vulnerable dependencies were reported.'
          }

      - name: Publish application deployment package
        run: |
          dotnet publish RobGitHub.Web/RobGitHub.Web.csproj --configuration Release --no-build --no-restore --output .artifacts/publish
          cd .artifacts/publish && zip --recurse-paths ../RobGitHub.Web.zip .

      - name: Compile Bicep deployment template
        run: az bicep build --file infra/main.bicep --outfile .artifacts/infra/main.json

      - name: Upload application artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: webapp-package
          path: .artifacts/RobGitHub.Web.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload infrastructure artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: infrastructure-template
          path: .artifacts/infra/main.json
          if-no-files-found: error
          retention-days: 7

      - name: Analyze C# with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:csharp'

  report-pr-ci:
    name: Update pull request CI summary
    needs: ci
    if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create or update CI summary comment
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const marker = '<!-- robgithub-ci-summary -->';
            const jobResult = '${{ needs.ci.result }}';
            const coveragePercentage = '${{ needs.ci.outputs.coverage_percentage }}';
            const checks = [
              ['Restore dependencies', '${{ needs.ci.outputs.restore }}'],
              ['Formatting', '${{ needs.ci.outputs.format }}'],
              ['Build', '${{ needs.ci.outputs.build }}'],
              ['Tests', '${{ needs.ci.outputs.test }}'],
              ['Line coverage (minimum 40%)', '${{ needs.ci.outputs.coverage }}', coveragePercentage ? `${coveragePercentage}%` : 'not reported'],
              ['Dependency vulnerability audit', '${{ needs.ci.outputs.dependency_audit }}'],
            ];
            const icons = {
              success: '✅',
              failure: '❌',
              cancelled: '⚪',
              skipped: '⏭️',
            };
            const status = (value) => value || 'skipped';
            const rows = checks
              .map(([name, result, detail]) => `| ${name} | ${icons[status(result)] ?? '⚠️'} ${status(result)}${detail ? ` — ${detail}` : ''} |`)
              .join('\n');
            const overall = icons[jobResult] ?? '⚠️';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## CI results: ${overall} ${jobResult}

            | Check | Result |
            | --- | --- |
            ${rows}

            [View this workflow run](${runUrl})`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existingComment = comments.find((comment) => comment.body?.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cd:
    name: Deploy staging and swap production
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download application artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: webapp-package
          path: .artifacts/app

      - name: Download infrastructure artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: infrastructure-template
          path: .artifacts/infra

      - name: Login to Azure
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Azure App Service infrastructure
        uses: azure/cli@v3.0.0
        with:
          inlineScript: |
            az deployment group create \
              --resource-group '${{ secrets.AZURE_RESOURCE_GROUP }}' \
              --template-file .artifacts/infra/main.json \
              --parameters webAppName='${{ secrets.AZURE_WEBAPP_NAME }}' location=eastus2 \
              --output none

      - name: Deploy application to staging slot
        uses: azure/webapps-deploy@v2.2.19
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          slot-name: staging
          package: .artifacts/app/RobGitHub.Web.zip

      - name: Verify staging health and swap to production
        uses: azure/cli@v3.0.0
        with:
          inlineScript: |
            webAppName='${{ secrets.AZURE_WEBAPP_NAME }}'
            resourceGroup='${{ secrets.AZURE_RESOURCE_GROUP }}'
            stagingUrl="https://${webAppName}-staging.azurewebsites.net/health"
            productionUrl="https://${webAppName}.azurewebsites.net/health"

            check_health() {
              url="$1"
              for attempt in $(seq 1 20); do
                if curl --fail --silent --show-error --max-time 30 "$url"; then
                  echo "Health check passed for $url."
                  return 0
                fi
                echo "Health check attempt $attempt/20 failed for $url."
                sleep 10
              done
              echo "Health check did not succeed for $url; production was not swapped." >&2
              return 1
            }

            check_health "$stagingUrl"
            az webapp deployment slot swap \
              --resource-group "$resourceGroup" \
              --name "$webAppName" \
              --slot staging \
              --target-slot production \
              --output none
            check_health "$productionUrl"
